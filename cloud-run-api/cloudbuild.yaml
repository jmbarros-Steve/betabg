steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/steve-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/steve-api:latest'
      - '.'
    dir: 'cloud-run-api'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/steve-api']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'steve-api'
      - '--image=gcr.io/$PROJECT_ID/steve-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--timeout=1200s'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=4'
      - '--set-secrets'
      - >-
        SUPABASE_URL=SUPABASE_URL:latest,
        SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,
        SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,
        ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,
        REPLICATE_API_KEY=REPLICATE_API_KEY:latest,
        FIRECRAWL_API_KEY=FIRECRAWL_API_KEY:latest,
        APIFY_TOKEN=APIFY_TOKEN:latest

options:
  logging: CLOUD_LOGGING_ONLY
