steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/steve-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/steve-api:latest'
      - '.'
    dir: 'cloud-run-api'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/steve-api']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'steve-api'
      - '--image=gcr.io/$PROJECT_ID/steve-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--timeout=600s'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets'
      - >-
        SUPABASE_URL=SUPABASE_URL:latest,
        SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,
        SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,
        ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,
        FAL_API_KEY=FAL_API_KEY:latest,
        REPLICATE_API_KEY=REPLICATE_API_KEY:latest,
        FIRECRAWL_API_KEY=FIRECRAWL_API_KEY:latest,
        OPENAI_API_KEY=OPENAI_API_KEY:latest,
        SHOPIFY_CLIENT_ID=SHOPIFY_CLIENT_ID:latest,
        SHOPIFY_CLIENT_SECRET=SHOPIFY_CLIENT_SECRET:latest,
        SHOPIFY_WEBHOOK_SECRET=SHOPIFY_WEBHOOK_SECRET:latest,
        META_APP_ID=META_APP_ID:latest,
        META_APP_SECRET=META_APP_SECRET:latest,
        GOOGLE_ADS_CLIENT_ID=GOOGLE_ADS_CLIENT_ID:latest,
        GOOGLE_ADS_CLIENT_SECRET=GOOGLE_ADS_CLIENT_SECRET:latest,
        GOOGLE_ADS_DEVELOPER_TOKEN=GOOGLE_ADS_DEVELOPER_TOKEN:latest,
        FRONTEND_URL=FRONTEND_URL:latest

options:
  logging: CLOUD_LOGGING_ONLY
