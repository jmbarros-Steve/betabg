.container{max-width:1100px;margin:0 auto;padding:20px}

.progress-stats span{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot-done{background:#22c55e}
.dot-fail{background:#ef4444}
.dot-skip{background:#f59e0b}
.dot-pending{background:#475569}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.controls button{padding:8px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.82rem;transition:.2s}
.controls button:hover{background:#334155;border-color:#60a5fa}
.controls button.active{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.controls .danger{border-color:#7f1d1d;color:#fca5a5}
.controls .danger:hover{background:#7f1d1d}
.controls .export-btn{border-color:#065f46;color:#6ee7b7}
.controls .export-btn:hover{background:#065f46}

.search-box{width:100%;padding:10px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:.9rem;margin-bottom:20px;outline:none}
.search-box:focus{border-color:#3b82f6}
.search-box::placeholder{color:#64748b}

/* SECTIONS */
.section{background:#1e293b;border:1px solid #334155;border-radius:12px;margin-bottom:16px;overflow:hidden;transition:.2s}
.section.collapsed .section-body{display:none}
.section-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;user-select:none}
.section-header:hover{background:#243044}
.section-title{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem;color:#60a5fa}
.section-title .arrow{transition:transform .2s;color:#475569}
.section.collapsed .arrow{transform:rotate(-90deg)}
.section-badge{font-size:.75rem;padding:3px 10px;border-radius:12px;font-weight:600}
.section-progress{display:flex;align-items:center;gap:8px}
.section-progress-bar{width:120px;height:6px;background:#334155;border-radius:3px;overflow:hidden}
.section-progress-fill{height:100%;border-radius:3px;transition:width .3s}
.section-progress-text{font-size:.78rem;color:#94a3b8;min-width:36px;text-align:right}

/* ITEMS */
.section-body{padding:0 8px 8px}
.item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin:2px 0;transition:.15s;cursor:pointer}
.item:hover{background:#243044}
.item.done{opacity:.6}
.item.done .item-text{text-decoration:line-through;color:#64748b}
.item.fail .item-text{color:#fca5a5}
.item.skip .item-text{color:#fde68a}

.btn-pass{border-color:#22c55e30}
.btn-pass:hover,.btn-pass.active{background:#22c55e;border-color:#22c55e}
.btn-fail{border-color:#ef444430}
.btn-fail:hover,.btn-fail.active{background:#ef4444;border-color:#ef4444}

.item-text{flex:1;font-size:.88rem;margin-top:2px}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getItemKey(sectionId, index) {
  return `${sectionId}${index + 1}`;
}

function getItemState(key) {
  return state[key] || { status: 'pending', note: '' };
}

function setItemStatus(key, status) {
  if (!state[key]) state[key] = { status: 'pending', note: '' };
  state[key].status = state[key].status === status ? 'pending' : status;
  saveState();
  render();
}

function setItemNote(key, note) {
  if (!state[key]) state[key] = { status: 'pending', note: '' };
  state[key].note = note;
  saveState();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const container = document.getElementById('checklistContainer');
  let html = '';
  let totalItems = 0, doneCount = 0, failCount = 0, skipCount = 0;

  const tagColors = {
    api: ['tag-api', 'API'],
    ui: ['tag-ui', 'UI'],
    db: ['tag-db', 'DB'],
    security: ['tag-security', 'SECURITY'],
    edge: ['tag-edge', 'EDGE FN'],
  };

  sections.forEach(section => {
    let sectionDone = 0, sectionTotal = section.items.length;
    let visibleItems = [];

    section.items.forEach((text, i) => {
      const key = getItemKey(section.id, i);
      const itemState = getItemState(key);
      totalItems++;

      if (itemState.status === 'done') { doneCount++; sectionDone++; }
      else if (itemState.status === 'fail') { failCount++; sectionDone++; }
      else if (itemState.status === 'skip') { skipCount++; sectionDone++; }

      // Filter
      let show = true;
      if (currentFilter === 'pending' && itemState.status !== 'pending') show = false;
      if (currentFilter === 'done' && itemState.status !== 'done') show = false;
      if (currentFilter === 'fail' && itemState.status !== 'fail') show = false;
      if (currentFilter === 'skip' && itemState.status !== 'skip') show = false;

      // Search
      if (searchQuery && !text.toLowerCase().includes(searchQuery.toLowerCase()) && !key.toLowerCase().includes(searchQuery.toLowerCase())) show = false;

      if (show) visibleItems.push({ text, i, key, itemState });
    });

    if (searchQuery && visibleItems.length === 0) return;

    const sectionPct = sectionTotal > 0 ? Math.round((sectionDone / sectionTotal) * 100) : 0;
    const fillColor = sectionPct === 100 ? '#22c55e' : sectionPct > 50 ? '#f59e0b' : '#3b82f6';
    const [tagClass, tagLabel] = tagColors[section.tag] || ['', ''];
    const isCollapsed = document.querySelector(`[data-section="${section.id}"]`)?.classList.contains('collapsed');

    html += `<div class="section ${isCollapsed ? 'collapsed' : ''}" data-section="${section.id}">`;
    html += `<div class="section-header" onclick="toggleSection('${section.id}')">`;
    html += `<div class="section-title"><span class="arrow">▼</span> ${section.id}. ${section.title} <span class="tag ${tagClass}">${tagLabel}</span></div>`;
    html += `<div class="section-progress">`;
    html += `<div class="section-progress-bar"><div class="section-progress-fill" style="width:${sectionPct}%;background:${fillColor}"></div></div>`;
    html += `<div class="section-progress-text">${sectionDone}/${sectionTotal}</div>`;
    html += `</div></div>`;
    html += `<div class="section-body">`;

    visibleItems.forEach(({ text, i, key, itemState }) => {
      const statusClass = itemState.status === 'done' ? 'done' : itemState.status === 'fail' ? 'fail' : itemState.status === 'skip' ? 'skip' : '';
      const hasNote = itemState.note ? 'has-note' : '';

      html += `<div class="item ${statusClass} ${hasNote}" data-key="${key}">`;
      html += `<div class="status-btns">`;
      html += `<button class="status-btn btn-pass ${itemState.status === 'done' ? 'active' : ''}" onclick="setItemStatus('${key}','done')" title="Pass">✓</button>`;
      html += `<button class="status-btn btn-fail ${itemState.status === 'fail' ? 'active' : ''}" onclick="setItemStatus('${key}','fail')" title="Fail">✗</button>`;
      html += `<button class="status-btn btn-skip ${itemState.status === 'skip' ? 'active' : ''}" onclick="setItemStatus('${key}','skip')" title="Skip">—</button>`;
      html += `</div>`;
      html += `<div class="item-id">${key}</div>`;
      html += `<div class="item-text">${text}</div>`;
      html += `<button class="note-toggle" onclick="toggleNote('${key}',event)" title="Agregar nota">📝</button>`;
      html += `<textarea class="item-note" id="note-${key}" placeholder="Notas..." onblur="setItemNote('${key}',this.value)">${itemState.note || ''}</textarea>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;

  // Update progress
  const totalChecked = doneCount + failCount + skipCount;
  const pct = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${totalChecked} / ${totalItems} (${pct}%)`;
  document.getElementById('countPass').textContent = doneCount;
  document.getElementById('countFail').textContent = failCount;
  document.getElementById('countSkip').textContent = skipCount;
  document.getElementById('countPending').textContent = totalItems - totalChecked;

  // Update filter buttons
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('filter' + currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1));
  if (activeBtn) activeBtn.classList.add('active');
}

function toggleSection(id) {
  const el = document.querySelector(`[data-section="${id}"]`);
  if (el) el.classList.toggle('collapsed');
}

function toggleNote(key, event) {
  event.stopPropagation();
  const item = document.querySelector(`[data-key="${key}"]`);
  if (item) {
    item.classList.toggle('has-note');
    if (item.classList.contains('has-note')) {
      const textarea = item.querySelector('.item-note');
      if (textarea) textarea.focus();
    }
  }
}

function filterItems(filter) {
  currentFilter = filter;
  render();
}

function searchItems(query) {
  searchQuery = query;
  render();
}

function expandAll() {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('collapsed'));
}

function collapseAll() {
  document.querySelectorAll('.section').forEach(s => s.classList.add('collapsed'));
}

function resetAll() {
  if (confirm('¿Estás seguro? Se borrará TODO el progreso del checklist.')) {
    state = {};
    saveState();
    render();
    showToast('Checklist reseteado', true);
  }
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.className = 'toast', 2500);
}

function exportResults() {
  let report = '# QA Report — Steve Ads Meta/Instagram/Campañas\n';
  report += `# Fecha: ${new Date().toLocaleString('es-CL')}\n\n`;

  let totalItems = 0, pass = 0, fail = 0, skip = 0;
  const failedItems = [];

  sections.forEach(section => {
    report += `## ${section.id}. ${section.title}\n`;
    section.items.forEach((text, i) => {
      const key = getItemKey(section.id, i);
      const s = getItemState(key);
      totalItems++;
      const icon = s.status === 'done' ? '[PASS]' : s.status === 'fail' ? '[FAIL]' : s.status === 'skip' ? '[SKIP]' : '[    ]';
      if (s.status === 'done') pass++;
      else if (s.status === 'fail') { fail++; failedItems.push({ key, text, note: s.note }); }
      else if (s.status === 'skip') skip++;
      report += `  ${icon} ${key}. ${text}\n`;
      if (s.note) report += `        NOTA: ${s.note}\n`;
    });
    report += '\n';
  });

  report += `\n## RESUMEN\n`;
  report += `Total: ${totalItems} | Pass: ${pass} | Fail: ${fail} | Skip: ${skip} | Pendiente: ${totalItems - pass - fail - skip}\n`;
  report += `Progreso: ${Math.round(((pass + fail + skip) / totalItems) * 100)}%\n`;

  if (failedItems.length > 0) {
    report += `\n## ITEMS FALLIDOS\n`;
    failedItems.forEach(f => {
      report += `  - ${f.key}: ${f.text}\n`;
      if (f.note) report += `    NOTA: ${f.note}\n`;
    });
  }

  navigator.clipboard.writeText(report).then(() => {
    showToast('Reporte copiado al clipboard');
  }).catch(() => {
    // Fallback: download
    const blob = new Blob([report], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'qa-report-meta.txt';
    a.click();
    showToast('Reporte descargado');
  });
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('searchBox').value = '';
    searchQuery = '';
    render();
  }
});

// Initial render
render();
</script>
</body>
</html>
