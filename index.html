<!doctype html>
<html lang="en">
  <head>
    <!-- Shopify App Bridge v3 CDN - loaded statically for embedded app checks -->
    <!-- The meta tag is injected dynamically ONLY when shop+host params are present -->
    <script>
      // Only load App Bridge when ACTUALLY in Shopify embedded context
      // Requires: host param (Shopify-generated) OR being inside an iframe
      // IMPORTANT: 'shop' or 'store' alone is NOT enough — the OAuth callback
      // has 'store' but is NOT embedded, and loading App Bridge without 'host' crashes
      (function() {
        var params = new URLSearchParams(window.location.search);
        var host = params.get('host');
        var inIframe = false;
        try { inIframe = window.self !== window.top; } catch(e) { inIframe = true; }
        if (host || inIframe) {
          var script = document.createElement('script');
          script.src = 'https://cdn.shopify.com/shopifycloud/app-bridge.js';
          document.head.appendChild(script);
          var meta = document.createElement('meta');
          meta.name = 'shopify-api-key';
          meta.content = '933109488c1e95e5fd630abb7e03809e';
          document.head.appendChild(meta);
        }
      })();
    </script>
