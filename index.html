<!doctype html>
<html lang="en">
  <head>
    <!-- Suppress App Bridge auto-init error on non-Shopify pages -->
    <script>
      // Catch the "missing required configuration fields: shop" error
      // that App Bridge throws when loaded without host/shop params
      // This is harmless on non-Shopify pages (/, /portal, /auth, etc.)
      window.addEventListener('error', function(e) {
        if (e.message && e.message.indexOf('missing required configuration fields') !== -1) {
          e.preventDefault();
          e.stopPropagation();
          console.log('[App Bridge] Suppressed auto-init error (not in Shopify context)');
          return true;
        }
      });
    </script>
    <!-- Shopify App Bridge v3 CDN - MUST be static in <head>, no async/defer -->
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <!-- Shopify API Key meta tag - required for automatic App Bridge detection -->
    <meta name="shopify-api-key" content="933109488c1e95e5fd630abb7e03809e" />
