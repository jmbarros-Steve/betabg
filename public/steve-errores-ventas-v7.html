const tagColors = {
  "discovery": "blue", "pitch timing": "blue", "BANT": "red", "authority": "red",
  "UX": "yellow", "meeting": "red", "parsing": "yellow", "objeciones": "red",
  "stage": "blue", "fit": "red", "tono": "yellow", "empatía": "yellow",
  "B2B": "red", "canal": "yellow", "reactivación": "blue", "negación": "red",
  "extracción": "yellow", "pain points": "yellow", "need": "red", "calificación": "red",
  "personalización": "blue", "velocity": "blue", "budget": "red", "honestidad": "yellow",
  "temperatura del lead": "blue", "urgencia": "red", "contexto": "yellow",
  "time-to-value": "yellow", "status": "yellow", "competencia": "red",
  "diferenciación": "blue", "strategist": "red", "back_off": "red", "pipeline": "blue",
  "lost": "red", "feedback": "yellow", "learning": "green", "score": "blue",
  "timeline": "red", "scoring": "red", "diagnóstico": "yellow", "elevator pitch": "green"
};

function getTagClass(tag) {
  const color = tagColors[tag] || "blue";
  if (color === "red") return "tag red";
  if (color === "green") return "tag green";
  if (color === "yellow") return "tag yellow";
  return "tag";
}

function buildBubbles(msgs) {
  return msgs.map(m => {
    const isUser = m.role === "user";
    const isInternal = m.role === "internal";
    const isSteve = m.role === "steve";

    if (isInternal) {
      return `<div class="bubble-row">
        <div class="bubble internal-msg">${escHtml(m.msg)}</div>
      </div>`;
    }

    if (isUser) {
      return `<div class="bubble-row user">
        <div class="avatar user-av">Tú</div>
        <div class="bubble user-msg">${escHtml(m.msg)}</div>
      </div>`;
    }

    return `<div class="bubble-row">
      <div class="avatar steve-av">🐕</div>
      <div class="bubble steve-msg">${escHtml(m.msg)}</div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

const container = document.getElementById('cards');

fixes.forEach(fix => {
  const tagsHtml = fix.tags.map(t => `<span class="${getTagClass(t)}">${t}</span>`).join('');

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-num">${fix.id}</div>
      <div>
        <div class="card-title">${escHtml(fix.titulo)}</div>
        <div class="card-problem">${escHtml(fix.problema)}</div>
        <div style="margin-top:6px">${tagsHtml}</div>
      </div>
    </div>
    <div class="examples">
      <div class="example bad">
        <div class="example-label">❌ Comportamiento actual</div>
        <div class="wa-chat">${buildBubbles(fix.bad)}</div>
      </div>
      <div class="example good">
        <div class="example-label">✅ Comportamiento correcto</div>
        <div class="wa-chat">${buildBubbles(fix.good)}</div>
      </div>
    </div>
    <div class="card-footer">
      <strong>Causa técnica:</strong> ${escHtml(fix.causa)}
    </div>
  `;
  container.appendChild(card);
});
