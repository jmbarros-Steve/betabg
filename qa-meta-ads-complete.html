<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Meta Ads Complete — Steve API</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17;
    color: #e2e8f0;
    padding: 0;
    min-height: 100vh;
  }

  /* Top Bar */
  .topbar {
    background: #111827;
    border-bottom: 1px solid #1f2937;
    padding: 12px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;

  }
  .topbar .logo {

    font-weight: 700;

    white-space: nowrap;
  }
  .topbar .logo span { color: #f59e0b; }
  .summary-pills {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }
  .pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pill.total { background: #1e293b; color: #94a3b8; }
  .pill.pass { background: #064e3b; color: #34d399; }
  .pill.fail { background: #7f1d1d; color: #fca5a5; }
  .pill.pending { background: #78350f; color: #fcd34d; }

  /* Auth Panel */
  .auth-panel {
    background: #111827;

  }
  .auth-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

  }
  .auth-field label {
    display: block;
    font-size: 0.7rem;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .auth-field input {
    width: 100%;
    background: #0a0e17;
    border: 1px solid #374151;
    color: #e2e8f0;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .auth-field input:focus {
    outline: none;
    border-color: #60a5fa;

  }
  .auth-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #3b82f6; }
  .btn-success { background: #059669; color: #fff; }
  .btn-success:hover { background: #10b981; }
  .btn-warning { background: #d97706; color: #fff; }
  .btn-warning:hover { background: #f59e0b; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-danger:hover { background: #ef4444; }
  .btn-ghost { background: #1f2937; color: #9ca3af; border: 1px solid #374151; }
  .btn-ghost:hover { background: #374151; color: #e5e7eb; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .auth-status {
    margin-top: 8px;
    font-size: 0.8rem;
    padding: 6px 12px;
    border-radius: 6px;
    display: none;
  }
  .auth-status.ok { display: block; background: #064e3b; color: #34d399; }
  .auth-status.err { display: block; background: #7f1d1d; color: #fca5a5; }

  /* Main Content */
  .main { max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

  /* Section */
  .section {
    margin-bottom: 16px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #1f2937;
  }
  .section-header {
    background: #111827;
    padding: 14px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;

  .section-header:hover { background: #1a2332; }
  .section-header h2 {

  .section-header .sec-badge {

  .section-body {

  /* Endpoint Card */
  .ep-card {

  .ep-card:last-child { border-bottom: none; }
  .ep-head {

  .ep-desc {

  .ep-status-dot {

  /* Params */

  /* Response */
  .ep-response {

    background: #0a0e17;

    border-radius: 8px;
    max-height: 400px;
    overflow: auto;

  }
  .ep-response.visible { display: block; }
  .ep-response pre {
    padding: 12px 16px;
    font-size: 0.78rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #a5b4fc;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Run All Bar */
  .run-all-bar {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 16px 20px;

    display: flex;

  .run-all-bar .progress-bar {
    flex: 1;
    min-width: 200px;
    background: #1f2937;
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .run-all-bar .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #34d399, #60a5fa);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s;
  }
  .run-all-bar .progress-text {
    font-size: 0.8rem;
    color: #9ca3af;
    white-space: nowrap;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #4b5563;
    border-top-color: #60a5fa;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.8rem;
    animation: toastIn 0.3s;
    max-width: 350px;
  }
  .toast.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #2563eb; }
  .toast.success { background: #064e3b; color: #6ee7b7; border: 1px solid #059669; }
  .toast.error { background: #7f1d1d; color: #fca5a5; border: 1px solid #dc2626; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  .tag-readonly {
    font-size: 0.55rem;
    background: #064e3b;
    color: #6ee7b7;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .tag-write {
    font-size: 0.55rem;
    background: #78350f;
    color: #fcd34d;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }

  @media (max-width: 768px) {
    .topbar { padding: 10px 12px; }
    .auth-panel, .run-all-bar { margin: 12px; }
    .main { padding: 0 12px 40px; }
    .ep-params { grid-template-columns: 1fr; }
    .summary-pills { margin-left: 0; width: 100%; justify-content: center; }
  }
</style>
</head>

<script>
// =========================================
// CONFIG & STATE
// =========================================
const state = {
  results: {},
  totalTests: 0,
  passed: 0,
  failed: 0,
  pending: 0
};

function getApiBase() { return document.getElementById('apiBaseUrl').value.replace(/\/$/, ''); }
function getJwt() { return document.getElementById('jwtToken').value; }
function getConnectionId() { return document.getElementById('connectionId').value; }
function getClientId() { return document.getElementById('clientId').value; }
function getCronSecret() { return document.getElementById('cronSecret').value; }

// =========================================
// TOAST
// =========================================
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// =========================================
// AUTH
// =========================================
async function doLogin() {
  const url = document.getElementById('supabaseUrl').value;
  const key = document.getElementById('supabaseKey').value;
  const statusEl = document.getElementById('authStatus');

  try {
    const res = await fetch(`${url}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': key
      },
      body: JSON.stringify({
        email: 'patricio.correa@jardindeeva.cl',
        password: 'Jardin2026'
      })
    });
    const data = await res.json();
    if (data.access_token) {
      document.getElementById('jwtToken').value = data.access_token;
      statusEl.className = 'auth-status ok';
      statusEl.textContent = `Login exitoso. User: ${data.user?.email || 'ok'} | Expira: ${new Date(data.expires_at * 1000).toLocaleString('es-CL')}`;
      showToast('Login exitoso', 'success');
    } else {
      statusEl.className = 'auth-status err';
      statusEl.textContent = `Error: ${data.error_description || data.msg || JSON.stringify(data)}`;
      showToast('Error en login', 'error');
    }
  } catch (e) {
    statusEl.className = 'auth-status err';
    statusEl.textContent = `Error de red: ${e.message}`;
    showToast('Error de conexion', 'error');
  }
}

async function checkToken() {
  const jwt = getJwt();
  const statusEl = document.getElementById('authStatus');
  if (!jwt) {
    statusEl.className = 'auth-status err';
    statusEl.textContent = 'No hay token. Haz login primero.';
    return;
  }
  try {
    const parts = jwt.split('.');
    const payload = JSON.parse(atob(parts[1]));
    const exp = new Date(payload.exp * 1000);
    const now = new Date();
    if (exp < now) {
      statusEl.className = 'auth-status err';
      statusEl.textContent = `Token EXPIRADO. Expiro: ${exp.toLocaleString('es-CL')}`;
    } else {
      statusEl.className = 'auth-status ok';
      statusEl.textContent = `Token valido. Sub: ${payload.sub} | Rol: ${payload.role} | Expira: ${exp.toLocaleString('es-CL')}`;
    }
  } catch (e) {
    statusEl.className = 'auth-status err';
    statusEl.textContent = `Token invalido: ${e.message}`;
  }
}

// =========================================
// API CALL
// =========================================
async function callApi(epId, path, body, isCron=false) {
  const base = getApiBase();
  const jwt = getJwt();
  const cronSecret = getCronSecret();

  const url = base + path;
  const headers = { 'Content-Type': 'application/json' };

  if (isCron) {
    if (cronSecret) headers['X-Cron-Secret'] = cronSecret;
  } else {
    if (jwt) headers['Authorization'] = 'Bearer ' + jwt;
  }

  const responseEl = document.getElementById(`resp-${epId}`);
  const statusEl = document.getElementById(`status-${epId}`);
  const timeEl = document.getElementById(`time-${epId}`);
  const dotEl = document.getElementById(`dot-${epId}`);

  responseEl.classList.add('visible');
  responseEl.querySelector('pre').textContent = 'Cargando...';
  statusEl.textContent = '';
  statusEl.className = 'http-status';
  timeEl.textContent = '';
  dotEl.className = 'ep-status-dot';

  const t0 = performance.now();
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });
    const elapsed = Math.round(performance.now() - t0);
    timeEl.textContent = `${elapsed}ms`;

    let data;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('json')) {
      data = await res.json();
    } else {
      data = await res.text();
    }

    const statusCode = res.status;
    statusEl.textContent = statusCode;
    if (statusCode >= 200 && statusCode < 300) {
      statusEl.className = 'http-status s2xx';
      dotEl.className = 'ep-status-dot ok';
      updateResult(epId, 'pass');
    } else if (statusCode >= 400 && statusCode < 500) {
      statusEl.className = 'http-status s4xx';
      dotEl.className = 'ep-status-dot warn';
      updateResult(epId, 'fail');
    } else {
      statusEl.className = 'http-status s5xx';
      dotEl.className = 'ep-status-dot err';
      updateResult(epId, 'fail');
    }

    responseEl.querySelector('pre').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  } catch (e) {
    const elapsed = Math.round(performance.now() - t0);
    timeEl.textContent = `${elapsed}ms`;
    statusEl.textContent = 'ERR';
    statusEl.className = 'http-status s5xx';
    dotEl.className = 'ep-status-dot err';
    responseEl.querySelector('pre').textContent = `Error de red: ${e.message}`;
    updateResult(epId, 'fail');
  }
}

function updateResult(epId, status) {
  const prev = state.results[epId];
  state.results[epId] = status;

  if (prev === 'pass') state.passed--;
  else if (prev === 'fail') state.failed--;
  else if (!prev) state.pending--;

  if (status === 'pass') state.passed++;
  else if (status === 'fail') state.failed++;

  refreshCounts();
}

function refreshCounts() {
  state.pending = state.totalTests - state.passed - state.failed;
  document.getElementById('totalCount').textContent = state.totalTests;
  document.getElementById('passCount').textContent = state.passed;
  document.getElementById('failCount').textContent = state.failed;
  document.getElementById('pendingCount').textContent = state.pending;
}

function clearAllResults() {
  state.results = {};
  state.passed = 0;
  state.failed = 0;
  state.pending = state.totalTests;
  refreshCounts();
  document.querySelectorAll('.ep-response').forEach(el => {
    el.classList.remove('visible');
    el.querySelector('pre').textContent = '';
  });
  document.querySelectorAll('.http-status').forEach(el => { el.textContent = ''; el.className = 'http-status'; });
  document.querySelectorAll('.response-time').forEach(el => el.textContent = '');
  document.querySelectorAll('.ep-status-dot').forEach(el => el.className = 'ep-status-dot');
  showToast('Resultados limpiados', 'info');
}

// ENDPOINT DEFINITIONS
// =========================================
const sections = [
  {

    endpoints: [
      {

          { name: 'connection_id', label: 'Connection ID', useGlobal: 'connectionId' }

      },
      {
        id: 'fetch-ad-accounts',
        path: '/api/fetch-meta-ad-accounts',
        method: 'POST',
        desc: 'Lista cuentas publicitarias con agrupacion por negocio',
        readonly: true,
        params: [
          { name: 'connection_id', label: 'Connection ID', useGlobal: 'connectionId' }
        ]
      },

        path: '/api/cron/publish-instagram',
        method: 'CRON',
        desc: 'Publicar posts programados de Instagram',
        readonly: false,
        isCron: true,
        params: []
      }
    ]
  }
];

// =========================================
// BUILD UI
// =========================================
function buildUI() {
  const container = document.getElementById('sectionsContainer');
  let totalEps = 0;

  sections.forEach(sec => {
    totalEps += sec.endpoints.length;

    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'section';

    // Header
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <h2>${sec.icon} ${sec.title} <span class="sec-badge">${sec.endpoints.length} endpoints</span></h2>
      <span class="arrow">&#9660;</span>
    `;
    header.addEventListener('click', () => {
      header.classList.toggle('open');
      body.classList.toggle('open');
    });

    // Body
    const body = document.createElement('div');
    body.className = 'section-body';

    sec.endpoints.forEach(ep => {
      const card = document.createElement('div');
      card.className = 'ep-card';

      const methodClass = ep.isCron ? 'cron' : ep.method.toLowerCase();
      const readonlyTag = ep.readonly
        ? '<span class="tag-readonly">lectura</span>'
        : '<span class="tag-write">escritura</span>';

      let paramsHtml = '';
      if (ep.params.length > 0) {
        paramsHtml = '<div class="ep-params">';
        ep.params.forEach(p => {
          const val = p.useGlobal ? '' : (p.defaultVal || '');
          const globalNote = p.useGlobal ? ' (auto)' : '';
          paramsHtml += `
            <div class="ep-param">
              <label>${p.label}${globalNote}</label>
              <input type="text" id="param-${ep.id}-${p.name}" value="${val}"
                     placeholder="${p.useGlobal ? 'Se auto-llena desde config' : ''}"
                     data-global="${p.useGlobal || ''}" data-name="${p.name}">
            </div>
          `;
        });
        paramsHtml += '</div>';
      }

      card.innerHTML = `
        <div class="ep-head">
          <span class="ep-status-dot" id="dot-${ep.id}"></span>
          <span class="method-badge ${methodClass}">${ep.isCron ? 'CRON' : ep.method}</span>
          <span class="ep-path">${ep.path}</span>
          ${readonlyTag}
          <span class="ep-desc">${ep.desc}</span>
        </div>
        ${paramsHtml}
        <div class="ep-actions">
          <button class="btn btn-primary" onclick="executeEndpoint('${ep.id}')">Ejecutar</button>
          <span class="http-status" id="status-${ep.id}"></span>
          <span class="response-time" id="time-${ep.id}"></span>
        </div>
        <div class="ep-response" id="resp-${ep.id}">
          <pre></pre>
        </div>
      `;

      body.appendChild(card);
    });

    sectionDiv.appendChild(header);
    sectionDiv.appendChild(body);
    container.appendChild(sectionDiv);
  });

  state.totalTests = totalEps;
  state.pending = totalEps;
  refreshCounts();
}

function getEndpointDef(epId) {
  for (const sec of sections) {
    for (const ep of sec.endpoints) {
      if (ep.id === epId) return ep;
    }
  }
  return null;
}

function collectParams(ep) {
  const body = {};
  ep.params.forEach(p => {
    const input = document.getElementById(`param-${ep.id}-${p.name}`);
    let val = input ? input.value : '';

    // Auto-fill from global
    if (p.useGlobal && !val) {
      const globalEl = document.getElementById(p.useGlobal);
      if (globalEl) val = globalEl.value;
    }

    if (val !== '') {
      // Try to parse numbers
      if (!isNaN(val) && val.trim() !== '' && !p.name.includes('id') && !p.name.includes('key') && !p.name.includes('token')) {
        body[p.name] = Number(val);
      } else {
        body[p.name] = val;
      }
    }
  });
  return body;
}

function executeEndpoint(epId) {
  const ep = getEndpointDef(epId);
  if (!ep) return;

  // Fill global params into inputs for visibility
  ep.params.forEach(p => {
    if (p.useGlobal) {
      const input = document.getElementById(`param-${ep.id}-${p.name}`);
      const globalEl = document.getElementById(p.useGlobal);
      if (input && globalEl && !input.value) {
        input.value = globalEl.value;
      }
    }
  });

  const body = collectParams(ep);
  callApi(ep.id, ep.path, body, ep.isCron || false);
}

// =========================================
// RUN ALL READ-ONLY
// =========================================
async function runAllReadOnly() {
  const readOnlyEps = [];
  sections.forEach(sec => {
    sec.endpoints.forEach(ep => {
      if (ep.readonly) readOnlyEps.push(ep);
    });
  });

  const total = readOnlyEps.length;
  const progressBar = document.getElementById('runAllProgress');
  const progressText = document.getElementById('runAllText');
  const btn = document.getElementById('runAllBtn');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Ejecutando...';

  // Open all sections
  document.querySelectorAll('.section-header').forEach(h => {
    if (!h.classList.contains('open')) {
      h.classList.add('open');
      h.nextElementSibling.classList.add('open');
    }
  });

  for (let i = 0; i < readOnlyEps.length; i++) {
    const ep = readOnlyEps[i];

    // Auto-fill global params
    ep.params.forEach(p => {
      if (p.useGlobal) {
        const input = document.getElementById(`param-${ep.id}-${p.name}`);
        const globalEl = document.getElementById(p.useGlobal);
        if (input && globalEl && !input.value) {
          input.value = globalEl.value;
        }
      }
    });

    const body = collectParams(ep);
    await callApi(ep.id, ep.path, body, ep.isCron || false);

    const pct = Math.round(((i + 1) / total) * 100);
    progressBar.style.width = pct + '%';
    progressText.textContent = `${i + 1} / ${total}`;

    // Small delay between requests
    await new Promise(r => setTimeout(r, 300));
  }

  btn.disabled = false;
  btn.textContent = 'Ejecutar Todos los Tests de Lectura';
  showToast(`Completados ${total} tests de lectura`, 'success');
}

// =========================================
// EXPORT
// =========================================
function exportResults() {
  const report = {
    timestamp: new Date().toISOString(),
    apiBase: getApiBase(),
    summary: {
      total: state.totalTests,
      passed: state.passed,
      failed: state.failed,
      pending: state.pending
    },
    results: {}
  };

  sections.forEach(sec => {
    report.results[sec.id] = {};
    sec.endpoints.forEach(ep => {
      const statusEl = document.getElementById(`status-${ep.id}`);
      const timeEl = document.getElementById(`time-${ep.id}`);
      const respEl = document.getElementById(`resp-${ep.id}`);
      report.results[sec.id][ep.id] = {
        path: ep.path,
        status: statusEl ? statusEl.textContent : 'pending',
        time: timeEl ? timeEl.textContent : '',
        result: state.results[ep.id] || 'pending',
        response: respEl ? respEl.querySelector('pre').textContent.substring(0, 500) : ''
      };
    });
  });

  const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `qa-meta-ads-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Resultados exportados', 'success');
}

// =========================================
// INIT
// =========================================
buildUI();
</script>
