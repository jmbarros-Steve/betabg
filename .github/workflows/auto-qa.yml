name: Auto QA — Post-Deploy Health Check

on:
  push:
    branches: [main]

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: https://zpswjccsxjtnhetkkqde.supabase.co
      CLOUD_RUN_URL: https://steve-api-850416724643.us-central1.run.app

    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Call health-check edge function
        id: health
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/functions/v1/health-check" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response<<RESEOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "RESEOF" >> $GITHUB_OUTPUT

          # Parse failed count
          FAILED=$(echo "$BODY" | jq -r '.failed // 0')
          SLOW=$(echo "$BODY" | jq -r '.slow // 0')
          TOTAL=$(echo "$BODY" | jq -r '.total // 0')
          OK_COUNT=$(echo "$BODY" | jq -r '.ok // 0')

          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "slow=$SLOW" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "ok_count=$OK_COUNT" >> $GITHUB_OUTPUT

          echo "📊 Health check: $OK_COUNT/$TOTAL OK, $FAILED failed, $SLOW slow"

          # Show per-endpoint results
          echo "$BODY" | jq -r '.endpoints[] | "  \(if .ok then "✅" else "❌" end) \(.name): HTTP \(.status) (\(.time_ms)ms)"' 2>/dev/null || true

      - name: Create task for failed endpoints
        if: steps.health.outputs.failed != '0' && steps.health.outputs.failed != ''
        run: |
          echo "🚨 ${{ steps.health.outputs.failed }} endpoints failed — creating task..."

          # Extract failed endpoint names
          FAILED_LIST=$(echo '${{ steps.health.outputs.response }}' | \
            jq -r '[.endpoints[] | select(.ok == false) | .name] | join(", ")' 2>/dev/null || echo "unknown")

          curl -s -X POST \
            "${SUPABASE_URL}/rest/v1/tasks" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$(jq -n \
              --arg title "🚨 Auto-QA: ${{ steps.health.outputs.failed }} endpoints fallaron post-deploy" \
              --arg desc "Commit: ${{ github.sha }}\nEndpoints caídos: ${FAILED_LIST}\n\nResultado completo del health-check adjunto en spec." \
              --arg spec "${{ steps.health.outputs.response }}" \
              '{
                title: $title,
                description: $desc,
                priority: "critical",
                type: "fix",
                source: "ojos",
                assigned_squad: "infra",
                status: "pending",
                attempts: 0,
                spec: ($spec | fromjson? // {raw: $spec})
              }')"

          echo "✅ Task created in Supabase"

      - name: Fail workflow if endpoints down
        if: steps.health.outputs.failed != '0' && steps.health.outputs.failed != ''
        run: |
          echo "❌ ${{ steps.health.outputs.failed }} critical endpoints failed after deploy"
          echo '${{ steps.health.outputs.response }}' | jq '.endpoints[] | select(.ok == false)' 2>/dev/null || true
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Auto QA Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total endpoints | ${{ steps.health.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OK | ${{ steps.health.outputs.ok_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.health.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slow (>3s) | ${{ steps.health.outputs.slow }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  smoke-qa:
    needs: health-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SITE_URL: https://www.steve.cl
      SUPABASE_URL: https://zpswjccsxjtnhetkkqde.supabase.co

    steps:
      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Smoke test — Login
        id: login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/auth/v1/token?grant_type=password" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"email":"patricio.correa@jardindeeva.cl","password":"Jardin2026"}')

          if [ "$STATUS" = "200" ]; then
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "✅ Login OK (HTTP $STATUS)"
          else
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "❌ Login FAILED (HTTP $STATUS)"
          fi

      - name: Smoke test — Dashboard loads
        id: dashboard
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL/portal")
          if [ "$STATUS" = "200" ]; then
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "✅ Dashboard loads (HTTP $STATUS)"
          else
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "❌ Dashboard FAILED (HTTP $STATUS)"
          fi

      - name: Smoke test — Estrategia chat endpoint
        id: estrategia
        run: |
          # Get auth token
          TOKEN=$(curl -s \
            "${SUPABASE_URL}/auth/v1/token?grant_type=password" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"email":"patricio.correa@jardindeeva.cl","password":"Jardin2026"}' \
            | jq -r '.access_token // empty')

          if [ -z "$TOKEN" ]; then
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "❌ Estrategia: Could not get auth token"
            exit 0
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://steve-api-850416724643.us-central1.run.app/api/steve-chat" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"test","shopId":"9432e754-ad5a-4115-904c-d048de1d0e1e"}')

          if [ "$STATUS" = "200" ]; then
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "✅ Estrategia chat OK (HTTP $STATUS)"
          else
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "❌ Estrategia chat FAILED (HTTP $STATUS)"
          fi

      - name: Smoke test — Steve Mail editor loads
        id: stevemail
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL/portal")
          # Check that the Steve Mail JS bundle is served
          BUNDLE=$(curl -s "$SITE_URL/portal" | grep -c "assets/index" || true)
          if [ "$STATUS" = "200" ] && [ "$BUNDLE" -gt 0 ]; then
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "✅ Steve Mail editor loads (bundle present)"
          else
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "❌ Steve Mail editor FAILED (HTTP $STATUS, bundle=$BUNDLE)"
          fi

      - name: Count failures and create task
        id: results
        run: |
          FAILURES=0
          FAILED_TESTS=""

          if [ "${{ steps.login.outputs.result }}" = "fail" ]; then
            FAILURES=$((FAILURES + 1))
            FAILED_TESTS="${FAILED_TESTS}Login, "
          fi
          if [ "${{ steps.dashboard.outputs.result }}" = "fail" ]; then
            FAILURES=$((FAILURES + 1))
            FAILED_TESTS="${FAILED_TESTS}Dashboard, "
          fi
          if [ "${{ steps.estrategia.outputs.result }}" = "fail" ]; then
            FAILURES=$((FAILURES + 1))
            FAILED_TESTS="${FAILED_TESTS}Estrategia chat, "
          fi
          if [ "${{ steps.stevemail.outputs.result }}" = "fail" ]; then
            FAILURES=$((FAILURES + 1))
            FAILED_TESTS="${FAILED_TESTS}Steve Mail, "
          fi

          FAILED_TESTS=$(echo "$FAILED_TESTS" | sed 's/, $//')
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT
          echo "📊 Smoke QA: $((4 - FAILURES))/4 passed, $FAILURES failed"

          if [ "$FAILURES" -gt 0 ]; then
            echo "🚨 Failed: $FAILED_TESTS"

            # Build JSON payload first to debug
            PAYLOAD=$(jq -n \
              --arg title "QA: Smoke test — ${FAILURES} checks fallaron post-deploy" \
              --arg desc "Commit: ${{ github.sha }}. Failed: ${FAILED_TESTS}. Triggered by push to main." \
              --arg sha "${{ github.sha }}" \
              '{
                title: $title,
                description: $desc,
                priority: "alta",
                type: "bug",
                source: "ojos",
                assigned_squad: "producto",
                status: "pending",
                attempts: 0,
                spec: { commit: $sha, trigger: "auto-qa-smoke" }
              }')

            echo "📦 Payload: $PAYLOAD"

            TASK_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${SUPABASE_URL}/rest/v1/tasks" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=representation" \
              -d "$PAYLOAD")

            TASK_HTTP=$(echo "$TASK_RESPONSE" | tail -1)
            TASK_BODY=$(echo "$TASK_RESPONSE" | sed '$d')

            echo "📡 Supabase response: HTTP $TASK_HTTP"
            echo "$TASK_BODY" | jq '.[0].id // .' 2>/dev/null || echo "$TASK_BODY"

            if [ "$TASK_HTTP" = "201" ]; then
              echo "✅ Task created in Supabase"
            else
              echo "❌ Failed to create task (HTTP $TASK_HTTP)"
              echo "$TASK_BODY"
            fi
          fi

      - name: Fail if smoke tests failed
        if: steps.results.outputs.failures != '0'
        run: |
          echo "❌ ${{ steps.results.outputs.failures }} smoke tests failed: ${{ steps.results.outputs.failed_tests }}"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Smoke QA Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Login | ${{ steps.login.outputs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | ${{ steps.dashboard.outputs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Estrategia chat | ${{ steps.estrategia.outputs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Steve Mail | ${{ steps.stevemail.outputs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
