name: Post-Deploy Smoke Test

on:
  deployment_status:

jobs:
  smoke-test:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Wait for deploy to stabilize
        run: sleep 30

      - name: Get deploy URL
        id: url
        run: |
          URL="${{ github.event.deployment_status.target_url }}"
          echo "deploy_url=${URL:-https://www.steve.cl}" >> $GITHUB_OUTPUT

      - name: Create smoke tests
        run: |
          cat > e2e/_smoke.spec.ts << 'SMOKEEOF'
          import { test, expect } from '@playwright/test';

          const BASE = process.env.SMOKE_URL || 'https://www.steve.cl';
          const API  = process.env.API_URL  || 'https://steve-api-850416724643.us-central1.run.app';
          const EMAIL = 'patricio.correa@jardindeeva.cl';
          const PASS  = 'Jardin2026';

          // ── B.3 Test 1: Portal loads ──
          test('1. Portal loads — login page renders', async ({ page }) => {
            const res = await page.goto(`${BASE}/auth`);
            expect(res?.status()).toBe(200);
            await expect(page.locator('input[type="email"]')).toBeVisible({ timeout: 10000 });
            await expect(page.locator('input[type="password"]')).toBeVisible({ timeout: 5000 });
            await expect(page.locator('button:has-text("Iniciar")')).toBeVisible({ timeout: 5000 });
          });

          // ── B.3 Test 2: API health ──
          test('2. API health — Cloud Run responds', async ({ request }) => {
            const res = await request.get(`${API}/`);
            expect(res.status()).toBe(200);
          });

          // ── B.3 Test 3: Auth endpoint ──
          test('3. Auth endpoint — login + redirect to portal', async ({ page }) => {
            await page.goto(`${BASE}/auth`);
            await page.locator('input[type="email"]').fill(EMAIL);
            await page.locator('input[type="password"]').fill(PASS);
            await page.locator('button:has-text("Iniciar")').click();
            await page.waitForTimeout(8000);
            // Should leave /auth after successful login
            expect(page.url()).not.toContain('/auth');
            // Should see portal tabs
            const body = await page.textContent('body');
            expect(body).toContain('Steve');
          });

          // ── B.3 Test 4: Steve chat responds ──
          test('4. Steve chat — API accepts message', async ({ request }) => {
            // First login to get a token
            const loginRes = await request.post(`${API}/api/steve-chat`, {
              headers: { 'Content-Type': 'application/json' },
              data: { message: 'ping', client_id: 'test' },
            });
            // Should get 401 (no auth) not 500 (crash)
            expect([401, 403, 404].includes(loginRes.status()) || loginRes.ok()).toBeTruthy();
          });
          SMOKEEOF

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        run: |
          npx playwright test e2e/_smoke.spec.ts --reporter=line 2>&1 | tee /tmp/smoke-results.txt
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          echo "results<<RESEOF" >> $GITHUB_OUTPUT
          head -50 /tmp/smoke-results.txt >> $GITHUB_OUTPUT
          echo "RESEOF" >> $GITHUB_OUTPUT
        env:
          SMOKE_URL: ${{ steps.url.outputs.deploy_url }}
          API_URL: https://steve-api-850416724643.us-central1.run.app

      # ── Rollback automático ──
      - name: Rollback Vercel on failure
        if: steps.smoke.outputs.exit_code != '0'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "🚨 Smoke tests failed — rolling back Vercel deploy..."

          DEPLOYMENTS=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&state=READY&target=production&limit=5" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")

          PREVIOUS_ID=$(echo "$DEPLOYMENTS" | jq -r '.deployments[1].uid // empty')

          if [ -n "$PREVIOUS_ID" ]; then
            curl -s -X POST "https://api.vercel.com/v13/deployments/${PREVIOUS_ID}/promote" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json"
            echo "✅ Rolled back to deployment: ${PREVIOUS_ID}"
          else
            echo "⚠️ No previous deployment found for rollback"
          fi

      - name: Rollback Cloud Run on failure
        if: steps.smoke.outputs.exit_code != '0'
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "🚨 Rolling back Cloud Run to previous revision..."

          # Get previous revision
          if command -v gcloud &> /dev/null; then
            PREV=$(gcloud run revisions list --service=steve-api --region=us-central1 \
              --project=steveapp-agency --format='value(REVISION)' --limit=2 | tail -1)

            if [ -n "$PREV" ]; then
              gcloud run services update-traffic steve-api --region=us-central1 \
                --project=steveapp-agency --to-revisions="${PREV}=100"
              echo "✅ Cloud Run rolled back to: ${PREV}"
            else
              echo "⚠️ No previous Cloud Run revision found"
            fi
          else
            echo "⚠️ gcloud not available — manual rollback needed"
          fi

      - name: Create GitHub issue on rollback
        if: steps.smoke.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED=$(echo '${{ steps.smoke.outputs.results }}' | grep -E "failed|✘|×|Error" | head -5)
          gh issue create \
            --title "🚨 ROLLBACK — Smoke tests failed on deploy" \
            --body "## Deploy rolled back automatically

          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}

          ### Failed tests:
          \`\`\`
          ${FAILED}
          \`\`\`

          ### Full results:
          \`\`\`
          $(head -30 /tmp/smoke-results.txt)
          \`\`\`

          **Action needed:** Fix the failing tests and re-deploy." \
            --label "bug,deploy" || echo "Could not create issue"

      - name: Cleanup
        if: always()
        run: rm -f e2e/_smoke.spec.ts
