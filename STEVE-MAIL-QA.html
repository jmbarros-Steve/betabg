<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steve Mail — QA Manual Completo</title>
<style>
  :root {
    --bg:#09090b;--s1:#18181b;--s2:#1e1e23;--s3:#27272a;--border:#2e2e33;
    --text:#e4e4e7;--muted:#71717a;--dim:#52525b;
    --purple:#6366f1;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4;--pink:#ec4899;
    --green-bg:rgba(34,197,94,.12);--red-bg:rgba(239,68,68,.12);--orange-bg:rgba(245,158,11,.12);--purple-bg:rgba(99,102,241,.1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

  /* Header */
  .header{background:linear-gradient(135deg,#1e1b4b,#312e81);padding:32px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .header h1{font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:10px}
  .header h1 span{font-size:1.6rem}
  .header-stats{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .hstat{text-align:center;background:rgba(255,255,255,.06);border-radius:10px;padding:8px 16px;min-width:70px}
  .hstat .n{font-size:1.3rem;font-weight:700}
  .hstat .l{font-size:.65rem;color:#a5b4fc;text-transform:uppercase;letter-spacing:.5px}
  .hstat.pass .n{color:var(--green)} .hstat.fail .n{color:var(--red)} .hstat.skip .n{color:var(--orange)} .hstat.pend .n{color:var(--muted)}

  /* Progress */
  .progress-bar{max-width:1100px;margin:0 auto;padding:16px 24px 0}
  .pbar{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;display:flex}
  .pbar-fill{height:100%;transition:width .3s}
  .pbar-green{background:var(--green)} .pbar-red{background:var(--red)} .pbar-orange{background:var(--orange)}
  .progress-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:.7rem;color:var(--muted)}

  /* Controls */
  .controls{max-width:1100px;margin:0 auto;padding:12px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .filter-btn{padding:5px 14px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .15s;font-family:inherit}
  .filter-btn:hover{color:var(--text);border-color:var(--dim)}
  .filter-btn.active{background:var(--purple-bg);border-color:var(--purple);color:#a5b4fc}
  .search-box{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:.8rem;outline:none;width:200px;font-family:inherit}
  .search-box:focus{border-color:var(--purple)}
  .spacer{flex:1}
  .btn{padding:6px 16px;border-radius:8px;border:none;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--dim)}
  .btn-primary{background:var(--purple);color:#fff}
  .btn-primary:hover{background:#818cf8}

  /* Sections */
  .container{max-width:1100px;margin:0 auto;padding:0 24px 60px}
  .module{margin-top:32px}
  .module-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .module-icon{font-size:1.4rem}
  .module-title{font-size:1.1rem;font-weight:700;flex:1}
  .module-count{font-size:.75rem;color:var(--muted);background:var(--s2);padding:3px 10px;border-radius:12px}
  .module-progress{font-size:.75rem;font-weight:600}

  /* Test items */
  .test-item{background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
  .test-item:hover{border-color:var(--s3)}
  .test-item.status-pass{border-left:3px solid var(--green)}
  .test-item.status-fail{border-left:3px solid var(--red)}
  .test-item.status-skip{border-left:3px solid var(--orange)}
  .test-item.status-bug{border-left:3px solid var(--pink)}

  .test-row{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
  .test-num{font-size:.7rem;color:var(--dim);font-family:monospace;min-width:28px}
  .test-status-btns{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
  .sbtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--s2);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--muted)}
  .sbtn:hover{border-color:var(--dim);transform:scale(1.1)}
  .sbtn.active-pass{background:var(--green-bg);border-color:var(--green);color:var(--green)}
  .sbtn.active-fail{background:var(--red-bg);border-color:var(--red);color:var(--red)}
  .sbtn.active-skip{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
  .sbtn.active-bug{background:rgba(236,72,153,.12);border-color:var(--pink);color:var(--pink)}

  .test-name{font-size:.85rem;font-weight:500;flex:1}
  .test-name small{display:block;font-weight:400;font-size:.75rem;color:var(--muted);margin-top:2px}
  .test-priority{font-size:.6rem;padding:2px 7px;border-radius:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
  .p-critical{background:rgba(239,68,68,.15);color:#fca5a5}
  .p-high{background:rgba(245,158,11,.12);color:#fcd34d}
  .p-medium{background:rgba(59,130,246,.12);color:#93c5fd}
  .p-low{background:rgba(113,113,122,.15);color:var(--muted)}

  /* Expandable detail */
  .test-detail{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
  .test-detail.open{display:block}
  .detail-section{margin-top:10px}
  .detail-label{font-size:.7rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .detail-steps{font-size:.8rem;color:var(--muted);line-height:1.7}
  .detail-steps li{margin-bottom:4px;padding-left:4px}
  .detail-expected{font-size:.8rem;color:#a5b4fc;background:rgba(99,102,241,.08);padding:8px 12px;border-radius:6px;margin-top:6px}
  .notes-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:.8rem;outline:none;font-family:inherit;resize:vertical;min-height:50px;margin-top:6px}
  .notes-input:focus{border-color:var(--purple)}
  .screenshot-btn{margin-top:8px;font-size:.7rem;color:var(--muted);cursor:pointer;text-decoration:underline}

  /* Tags */
  .tag{font-size:.6rem;padding:2px 6px;border-radius:4px;background:var(--s2);color:var(--muted);border:1px solid var(--border)}

  /* Footer */
  .footer{max-width:1100px;margin:0 auto;padding:24px;text-align:center;color:var(--dim);font-size:.75rem;border-top:1px solid var(--border)}

  /* Print */
  @media print {
    .header{position:static;background:#1e1b4b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .controls{display:none}
    .test-detail{display:block!important}
    body{background:#fff;color:#111}
    .test-item{border:1px solid #ddd;break-inside:avoid}
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1><span>&#9997;</span> Steve Mail — QA Manual</h1>
    <div class="header-stats">
      <div class="hstat"><div class="n" id="totalCount">0</div><div class="l">Total</div></div>
      <div class="hstat pass"><div class="n" id="passCount">0</div><div class="l">Pass</div></div>
      <div class="hstat fail"><div class="n" id="failCount">0</div><div class="l">Fail</div></div>
      <div class="hstat" style=""><div class="n" id="bugCount" style="color:var(--pink)">0</div><div class="l">Bugs</div></div>
      <div class="hstat skip"><div class="n" id="skipCount">0</div><div class="l">Skip</div></div>
      <div class="hstat pend"><div class="n" id="pendCount">0</div><div class="l">Pendiente</div></div>
    </div>
  </div>
</header>

<div class="progress-bar">
  <div class="pbar" id="progressBar"></div>
  <div class="progress-labels">
    <span id="progressPct">0% completado</span>
    <span id="progressTime"></span>
  </div>
</div>

<div class="controls">
  <button class="filter-btn active" onclick="setFilter('all')">Todos</button>
  <button class="filter-btn" onclick="setFilter('pending')">&#9711; Pendientes</button>
  <button class="filter-btn" onclick="setFilter('pass')">&#10004; Pass</button>
  <button class="filter-btn" onclick="setFilter('fail')">&#10008; Fail</button>
  <button class="filter-btn" onclick="setFilter('bug')">&#128027; Bugs</button>
  <button class="filter-btn" onclick="setFilter('skip')">&#9654; Skip</button>
  <input class="search-box" placeholder="Buscar test..." oninput="setSearch(this.value)">
  <span class="spacer"></span>
  <button class="btn btn-ghost" onclick="resetAll()">&#128260; Reset</button>
  <button class="btn btn-ghost" onclick="exportReport()">&#128196; Exportar</button>
  <button class="btn btn-primary" onclick="saveProgress()">&#128190; Guardar</button>
</div>

<div class="container" id="container"></div>

<div class="footer">
  Steve Mail QA Manual · Generado 3 abril 2026 · Repo: jmbarros-Steve/betabg
</div>

// ===================== STATE =====================
let state = {};
let filter = 'all';
let search = '';

function loadState() {
  try { state = JSON.parse(localStorage.getItem('steve-mail-qa') || '{}'); } catch { state = {}; }
}
function saveState() { localStorage.setItem('steve-mail-qa', JSON.stringify(state)); }

function getTestState(id) { return state[id] || { status: 'pending', notes: '' }; }
function setTestStatus(id, status) {
  if (!state[id]) state[id] = { status: 'pending', notes: '' };
  state[id].status = state[id].status === status ? 'pending' : status;
  saveState(); render();
}
function setTestNotes(id, notes) {
  if (!state[id]) state[id] = { status: 'pending', notes: '' };
  state[id].notes = notes;
  saveState();
}

// ===================== RENDER =====================
function render() {
  const modules = {};
  TESTS.forEach(t => { if (!modules[t.module]) modules[t.module] = { icon: t.icon, tests: [] }; modules[t.module].tests.push(t); });

  // Stats
  let total = 0, pass = 0, fail = 0, skip = 0, bug = 0, pend = 0;
  TESTS.forEach(t => {
    total++;
    const s = getTestState(t.id).status;
    if (s === 'pass') pass++; else if (s === 'fail') fail++; else if (s === 'skip') skip++; else if (s === 'bug') bug++; else pend++;
  });

  document.getElementById('totalCount').textContent = total;
  document.getElementById('passCount').textContent = pass;
  document.getElementById('failCount').textContent = fail;
  document.getElementById('bugCount').textContent = bug;
  document.getElementById('skipCount').textContent = skip;
  document.getElementById('pendCount').textContent = pend;

  const done = pass + fail + skip + bug;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').innerHTML = `
    <div class="pbar-fill pbar-green" style="width:${total?(pass/total*100):0}%"></div>
    <div class="pbar-fill pbar-red" style="width:${total?(fail/total*100):0}%"></div>
    <div class="pbar-fill pbar-orange" style="width:${total?((skip+bug)/total*100):0}%"></div>`;
  document.getElementById('progressPct').textContent = `${pct}% completado (${done}/${total})`;

  // Render modules
  const container = document.getElementById('container');
  let html = '';

  for (const [modName, mod] of Object.entries(modules)) {
    let tests = mod.tests;

    // Filter
    if (filter !== 'all') tests = tests.filter(t => getTestState(t.id).status === filter);
    if (search) tests = tests.filter(t => t.name.toLowerCase().includes(search.toLowerCase()) || t.id.toLowerCase().includes(search.toLowerCase()));
    if (tests.length === 0) continue;

    const modPass = mod.tests.filter(t => getTestState(t.id).status === 'pass').length;
    const modTotal = mod.tests.length;

    html += `<div class="module">
      <div class="module-header">
        <span class="module-icon">${mod.icon}</span>
        <span class="module-title">${modName}</span>
        <span class="module-count">${modTotal} tests</span>
        <span class="module-progress" style="color:${modPass===modTotal?'var(--green)':'var(--muted)'}">${modPass}/${modTotal}</span>
      </div>`;

    tests.forEach((t, idx) => {
      const ts = getTestState(t.id);
      const statusClass = ts.status !== 'pending' ? `status-${ts.status}` : '';

      html += `<div class="test-item ${statusClass}" id="item-${t.id}">
        <div class="test-row" onclick="toggleDetail('${t.id}')">
          <span class="test-num">#${t.id}</span>
          <span class="test-name">${t.name}<small>${t.steps.length} pasos</small></span>
          <span class="test-priority p-${t.priority}">${t.priority}</span>
          <div class="test-status-btns" onclick="event.stopPropagation()">
            <button class="sbtn ${ts.status==='pass'?'active-pass':''}" onclick="setTestStatus('${t.id}','pass')" title="Pass">&#10004;</button>
            <button class="sbtn ${ts.status==='fail'?'active-fail':''}" onclick="setTestStatus('${t.id}','fail')" title="Fail">&#10008;</button>
            <button class="sbtn ${ts.status==='bug'?'active-bug':''}" onclick="setTestStatus('${t.id}','bug')" title="Bug">&#128027;</button>
            <button class="sbtn ${ts.status==='skip'?'active-skip':''}" onclick="setTestStatus('${t.id}','skip')" title="Skip">&#9654;</button>
          </div>
        </div>
        <div class="test-detail" id="detail-${t.id}">
          <div class="detail-section">
            <div class="detail-label">Pasos a seguir</div>
            <ol class="detail-steps">${t.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
          <div class="detail-section">
            <div class="detail-label">Resultado esperado</div>
            <div class="detail-expected">${t.expected}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Notas / Observaciones</div>
            <textarea class="notes-input" placeholder="Escribe notas, bugs encontrados, screenshots..." onchange="setTestNotes('${t.id}',this.value)">${ts.notes || ''}</textarea>
          </div>
        </div>
      </div>`;
    });

    html += '</div>';
  }

  container.innerHTML = html;

  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[onclick="setFilter('${filter}')"]`)?.classList.add('active');
}

function toggleDetail(id) {
  const el = document.getElementById(`detail-${id}`);
  if (el) el.classList.toggle('open');
}

function setFilter(f) { filter = f; render(); }
function setSearch(s) { search = s; render(); }

function saveProgress() {
  saveState();
  showToast('Progreso guardado en localStorage');
}

function resetAll() {
  if (!confirm('¿Resetear todo el progreso del QA? Esta acción no se puede deshacer.')) return;
  state = {};
  saveState();
  render();
  showToast('QA reseteado');
}

function exportReport() {
  const modules = {};
  TESTS.forEach(t => { if (!modules[t.module]) modules[t.module] = []; modules[t.module].push(t); });

  let md = `# Steve Mail — QA Report\n`;
  md += `**Fecha:** ${new Date().toLocaleString('es-CL')}\n\n`;

  let total=0, pass=0, fail=0, bug=0, skip=0;
  TESTS.forEach(t => {
    total++; const s = getTestState(t.id).status;
    if(s==='pass')pass++; else if(s==='fail')fail++; else if(s==='bug')bug++; else if(s==='skip')skip++;
  });

  md += `## Resumen\n| Métrica | Valor |\n|---------|-------|\n`;
  md += `| Total | ${total} |\n| Pass | ${pass} |\n| Fail | ${fail} |\n| Bugs | ${bug} |\n| Skip | ${skip} |\n| Pendientes | ${total-pass-fail-bug-skip} |\n| % Completado | ${Math.round(((pass+fail+bug+skip)/total)*100)}% |\n\n`;

  for (const [modName, tests] of Object.entries(modules)) {
    md += `## ${modName}\n\n`;
    tests.forEach(t => {
      const ts = getTestState(t.id);
      const icon = ts.status==='pass'?'✅':ts.status==='fail'?'❌':ts.status==='bug'?'🐛':ts.status==='skip'?'⏭️':'⬜';
      md += `- ${icon} **${t.name}** [${t.priority}]`;
      if (ts.notes) md += `\n  > ${ts.notes}`;
      md += '\n';
    });
    md += '\n';
  }

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `steve-mail-qa-${new Date().toISOString().slice(0,10)}.md`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Reporte exportado como Markdown');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#6366f1;color:#fff;padding:10px 20px;border-radius:8px;font-size:.85rem;z-index:9999';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ===================== INIT =====================
loadState();
render();
</script>
